    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta http-equiv="Clear-Site-Data" content='"cache"'>
    <title>BotanicAI v8.1.0</title>
    <script>
      // Desregistrar Service Workers viejos
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let reg of registrations) {
            reg.unregister();
            console.log("SW desregistrado:", reg.scope);
          }
        });
        // Limpiar caches del SW
        if (window.caches) {
          caches.keys().then(keys => keys.forEach(key => caches.delete(key)));
        }
      }
      console.log("BotanicAI v8.0.0 - Gemini API - Cache Clear");
    </script>
